<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <!-- StreetMarket -->
    <form id="formCadastro" action="index.html">
        <a href="index.html">
            <img src="imagens/img-logo.png" alt="Logotipo StreetMarket" id="logo">
        </a>
        <div class="block">
            <p>
                <label for="nome">Gmail:</label><br>
                <input type="text" id="nome" name="nome" required>
            </p>
            <a href="">
                <h6>Esqueceu a senha?</h6>
            </a>
            <p>
                <label for="password">Senha:</label><br>
                <input type="password" id="password" name="password" required>
            </p>
        <button type="submit" href="index.html">Enviar</button>
        <h6>Não possui conta?</h6>
        <a href=""><h5>Cadastre-se agora!</h5></a>
        </div>
    </form>
</body>
</html>
