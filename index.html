<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>StreetMarket</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="navs">
    <nav id="nav1">
        <div id="linkE1">                                                                                                           
                <a href="">
                    <i class="bi bi-geo-alt icon1"></i>
                    <span>Enviar para <br> <strong>São paulo, SP</strong></span>
                </a>
            <label for="categorias"></label>
            <i class="bi bi-list icon1"></i>
            <select id="categorias" required>
                <option>Categorias</option>
                <option>👟 Moda & Sneakers</option>
                <option>🎮 Gaming & Setup</option>
                <option>📱 Eletrônicos & Tech</option>
                <option>⚽ Esportes & Futebol</option>
                <option>🧢 Acessórios</option>
                <option>🔥 Ofertas & Drops</option>
                <option>🚀 Lançamentos</option>
                <option>Mais sobre nós</option>   
            </select> 
        </div>
        <div id="linkD1">
            <input type="search" placeholder="Buscar produtos, marcas e muito mais..." name="pesquisa" id="pesquisa">
            <button id="btn-pesquisa">
                <i class="bi bi-search"></i>
            </button>
            <a href=""><i class="bi bi-person icon1"></i>
                <span>Entre ou <br><b>crie conta</b></span>
            </a>
            <a href=""><i class="bi bi-cart2 icon1"></i></a>
        </div>
    </nav>
    <nav id="nav2">
        <div id="linkE2">
        <a href=""><i class="bi bi-lightning-fill icon2"></i> Ofertas do dia</a>
        <a href=""><i class="bi bi-ticket icon2"></i> Cupons</a>
        <a href=""><i class="bi bi-fire icon2"></i> Mais vendidos</a>
        </div>
        <div id="linkD2">
        <a href=""><i class="bi bi-star-fill icon2"></i> Street Points</a>
        <a href=""><i class="bi bi-shop-window icon2"></i> Venda na Street</a>
        <a href=""><i class="bi bi-question-circle icon2"></i> Ajuda</a>
        </div>
    </nav>
    <img src="imagens/img-logo.png" alt="Logotipo StreetMarket">
    </div>
    <div id="banner">

    </div>
</body>
</html>
